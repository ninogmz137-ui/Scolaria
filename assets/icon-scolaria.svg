<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="50%" stop-color="#1A1F3D"/>
      <stop offset="100%" stop-color="#0B0F2A"/>
    </linearGradient>
    <!-- Orbit gradient -->
    <linearGradient id="orbit" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <!-- Dot gradient -->
    <radialGradient id="dot">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </radialGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="55" y1="0" x2="55" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="110" y1="0" x2="110" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="165" y1="0" x2="165" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="220" y1="0" x2="220" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="275" y1="0" x2="275" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="330" y1="0" x2="330" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="385" y1="0" x2="385" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="440" y1="0" x2="440" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="495" y1="0" x2="495" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="550" y1="0" x2="550" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="605" y1="0" x2="605" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="660" y1="0" x2="660" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="715" y1="0" x2="715" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="770" y1="0" x2="770" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="825" y1="0" x2="825" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="880" y1="0" x2="880" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="935" y1="0" x2="935" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="990" y1="0" x2="990" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="1045" y1="0" x2="1045" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="0" y1="0" x2="1024" y2="0" stroke="white" stroke-width="1"/>
    <line x1="0" y1="55" x2="1024" y2="55" stroke="white" stroke-width="1"/>
    <line x1="0" y1="110" x2="1024" y2="110" stroke="white" stroke-width="1"/>
    <line x1="0" y1="165" x2="1024" y2="165" stroke="white" stroke-width="1"/>
    <line x1="0" y1="220" x2="1024" y2="220" stroke="white" stroke-width="1"/>
    <line x1="0" y1="275" x2="1024" y2="275" stroke="white" stroke-width="1"/>
    <line x1="0" y1="330" x2="1024" y2="330" stroke="white" stroke-width="1"/>
    <line x1="0" y1="385" x2="1024" y2="385" stroke="white" stroke-width="1"/>
    <line x1="0" y1="440" x2="1024" y2="440" stroke="white" stroke-width="1"/>
    <line x1="0" y1="495" x2="1024" y2="495" stroke="white" stroke-width="1"/>
    <line x1="0" y1="550" x2="1024" y2="550" stroke="white" stroke-width="1"/>
    <line x1="0" y1="605" x2="1024" y2="605" stroke="white" stroke-width="1"/>
    <line x1="0" y1="660" x2="1024" y2="660" stroke="white" stroke-width="1"/>
    <line x1="0" y1="715" x2="1024" y2="715" stroke="white" stroke-width="1"/>
    <line x1="0" y1="770" x2="1024" y2="770" stroke="white" stroke-width="1"/>
    <line x1="0" y1="825" x2="1024" y2="825" stroke="white" stroke-width="1"/>
    <line x1="0" y1="880" x2="1024" y2="880" stroke="white" stroke-width="1"/>
    <line x1="0" y1="935" x2="1024" y2="935" stroke="white" stroke-width="1"/>
    <line x1="0" y1="990" x2="1024" y2="990" stroke="white" stroke-width="1"/>
    <line x1="0" y1="1045" x2="1024" y2="1045" stroke="white" stroke-width="1"/>
  </g>

  <!-- Orbital ring -->
  <ellipse cx="512" cy="512" rx="340" ry="340"
    fill="none" stroke="url(#orbit)" stroke-width="4"
    stroke-dasharray="12 8" opacity="0.35"
    transform="rotate(-20 512 512)"/>

  <!-- Inner ring -->
  <ellipse cx="512" cy="512" rx="280" ry="280"
    fill="none" stroke="#6D28D9" stroke-width="2"
    opacity="0.15"/>

  <!-- Orbiting dot (top) -->
  <circle cx="512" cy="172" r="18" fill="url(#dot)" filter="url(#glow)"/>

  <!-- Orbiting dot (bottom-right) -->
  <circle cx="800" cy="620" r="12" fill="#22D3EE" opacity="0.6"/>

  <!-- Letter S -->
  <text x="512" y="560" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="380" font-weight="900" fill="white"
    letter-spacing="-10">S</text>

  <!-- Small "ia" text -->
  <text x="680" y="680" text-anchor="start"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="120" font-weight="700" fill="#22D3EE"
    opacity="0.9">ia</text>

  <!-- Star symbol -->
  <text x="810" y="620" text-anchor="middle"
    font-family="system-ui, sans-serif"
    font-size="40" fill="#22D3EE" opacity="0.8">✦</text>
</svg>